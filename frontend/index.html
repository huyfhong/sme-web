<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SME HUB - Viettel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/bootstrap-overrides.css">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/pages.css?v=2">
  <link rel="stylesheet" href="css/marketplace.css?v=1">
  <link rel="stylesheet" href="css/home.css?v=1">
  <link rel="stylesheet" href="css/consultation.css?v=1">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="../chatbot/FE_chatbot/css/chat_bot.css">
</head>
<body>
  <div id="app">
    <header id="header"></header>
    <div id="main-content"></div>
    <footer id="footer"></footer>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden"></div>
  <div id="modal-container" class="modal-container hidden">
    <div class="modal-content" id="modal-content"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/router.js"></script>

  <script src="js/pages/home.js"></script>
  <script src="js/pages/marketplace.js"></script>
  <script src="js/pages/product-detail.js"></script>
  <script src="js/pages/news.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/register.js"></script>
  <script src="js/pages/support.js"></script>
  <script src="js/pages/solution.js"></script>
  <script src="js/pages/team.js"></script>
  <script src="js/pages/admin.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>

  <!-- Chatbot -->
  <div id="chat-bubble" onclick="toggleChat()">
    <img src="https://media.vietteltelecom.vn/upload/ckfinder/files/icon%20chatbot.png" alt="Chatbot Icon">
  </div>
  <div id="chat-container">
    <div class="chat-header">
      <img src="https://media.vietteltelecom.vn/upload/ckfinder/files/icon%20chatbot.png" alt="Chatbot avatar" class="header-avatar">
      <span class="header-title">Trợ lý ảo SME</span>
      <span class="close-btn" onclick="toggleChat()">&times;</span>
    </div>
    <div id="messages">
      <div class="message-row bot-row">
        <img src="https://media.vietteltelecom.vn/upload/ckfinder/files/icon%20chatbot.png" class="bot-avatar" alt="Avatar">
        <div class="message bot">Xin chào! Tôi là trợ lý ảo Viettel. Tôi có thể hỗ trợ bạn về gói cước, tài khoản, tra cứu dịch vụ hoặc báo lỗi kỹ thuật. Bạn cần giúp gì?</div>
      </div>
    </div>
    <div id="suggestions"></div>
    <div class="input-area">
      <button class="menu-btn btn border-0" title="Danh mục gợi ý" onclick="toggleSuggestions()">
        <i class="fa-solid fa-list"></i>
      </button>
      <input type="text" id="user-input" placeholder="Nhập tin nhắn..." onkeypress="if(event.key === 'Enter') handleSend()">
      <button class="btn border-0" onclick="handleSend()"><i class="fa-regular fa-paper-plane"></i></button>
    </div>
  </div>
  <script src="../chatbot/FE_chatbot/js/views/ChatbotComponent.js"></script>
  <script src="../chatbot/FE_chatbot/js/views/chat_logic.js"></script>
</body>
</html>
